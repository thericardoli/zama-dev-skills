name: Check upstream updates

on:
  schedule:
    # GitHub cron cannot express a true rolling "every 5 days" cadence.
    # This workflow runs daily, while scripts/check_upstream.py enforces the
    # 5-day interval from upstream-state.json.
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run the upstream check even if the last check was less than 5 days ago."
        type: boolean
        default: true

permissions:
  contents: write
  issues: write

concurrency:
  group: upstream-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install script dependencies
        run: python -m pip install PyYAML

      - name: Check upstream sources
        run: |
          set -euo pipefail
          args=(
            --sources upstream-sources.yaml
            --state upstream-state.json
            --report "$RUNNER_TEMP/upstream-report.md"
            --summary "$RUNNER_TEMP/upstream-summary.json"
            --interval-days 5
          )
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.force }}" == "true" ]]; then
            args+=(--force)
          fi
          python scripts/check_upstream.py "${args[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read upstream summary
        id: summary
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          summary_path = os.path.join(os.environ["RUNNER_TEMP"], "upstream-summary.json")
          with open(summary_path, "r", encoding="utf-8") as f:
              summary = json.load(f)

          print(f"has_updates={str(bool(summary.get('has_updates'))).lower()}")
          print(f"skipped={str(bool(summary.get('skipped'))).lower()}")
          print(f"issue_title={summary.get('issue_title') or 'Upstream updates detected'}")
          PY

      - name: Create upstream update issue
        if: steps.summary.outputs.has_updates == 'true'
        run: |
          gh issue create \
            --title "${{ steps.summary.outputs.issue_title }}" \
            --body-file "$RUNNER_TEMP/upstream-report.md"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Persist upstream state
        run: |
          set -euo pipefail
          if git diff --quiet -- upstream-state.json; then
            echo "No upstream state changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream-state.json
          git commit -m "chore: update upstream state"
          git push
