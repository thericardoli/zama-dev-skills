# yaml-language-server: $schema=../schema/task.schema.json
id: fhe-counter-dapp-react-foundry

description: Build a complete local FHE counter dApp with Foundry contracts/tests and a React + RainbowKit frontend.

prompt: |
  Build a complete local FHE counter dApp from this empty workspace.

  Requirements:
  - Use Foundry for Solidity contract development and tests.
  - Use React for the frontend. The frontend must be real and complete enough to use in a browser, not a placeholder.
  - Use RainbowKit/wagmi/viem for wallet connection.
  - Use Zama FHEVM patterns for a simple confidential counter contract.
  - The contract should allow a user to submit an encrypted input value, add it to the encrypted counter, subtract an encrypted value from the encrypted counter, and decrypt/read the final value through the intended FHE decrypt flow.
  - Keep the contract intentionally simple, but implement the encrypted input, encrypted add/subtract, ACL/decrypt permissions, and tests correctly.
  - All tests and local execution should target a local Anvil chain only. Do not rely on Sepolia, Mainnet, hosted RPCs, or remote deployed contracts.
  - Include Foundry tests that exercise initialization, encrypted add, encrypted subtract, and final decrypt/read behavior.
  - Include a React UI that can connect a wallet, show connection/network state, accept a numeric input, encrypt it, submit add/subtract transactions, and decrypt/display the current counter value.
  - Include root-level npm scripts for the local workflow, including at least: `dev`, `build`, `anvil`, `deploy:local`, and `test:e2e`.
  - Provide a complete README that explains the architecture, prerequisites, dependency installation, local Anvil startup, local contract deployment, frontend startup, Foundry tests, frontend build, and how to run the e2e test flow.
  - The e2e instructions should describe the exact local sequence a reviewer should run, including how the wallet connects to Anvil and how the frontend points at the locally deployed contract.

  Implementation guidance:
  - Prefer a conventional repository shape with Solidity under `src/`, Forge tests under `test/`, and the React app under a clear frontend directory or root app structure.
  - If the frontend lives in a subdirectory, expose a root-level `npm run build` that builds it.
  - The final workspace should pass `forge test -vv` and `npm run build` from the repository root.
  - The final README and scripts should make it possible to run the whole local demo without reading source code.

codex:
  model: gpt-5.5
  think_level: high
  timeout_sec: 2400

baseline: false
skills:
  - zama-foundry-forge-fhevm
  - zama-sdk
